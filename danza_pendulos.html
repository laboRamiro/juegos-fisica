<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎪 La Danza de los Péndulos</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@400;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #fdf6e3;
    font-family: 'Comic Neue', cursive;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: radial-gradient(circle, #e8d5b0 1px, transparent 1px);
    background-size: 18px 18px;
    opacity: 0.35;
    pointer-events: none;
    z-index: 0;
  }
  .container {
    position: relative; z-index: 1;
    max-width: 1020px; margin: 0 auto; padding: 14px;
  }
  .header { text-align: center; margin-bottom: 10px; }
  .title {
    font-family: 'Bangers', cursive;
    font-size: clamp(1.8rem, 5.5vw, 3.5rem);
    letter-spacing: 3px; color: #1a1a1a;
    text-shadow: 4px 4px 0 #f4c430, 6px 6px 0 #1a1a1a; line-height: 1;
  }
  .subtitle { font-size: .9rem; color: #555; margin-top: 3px; font-weight: 700; }

  /* Two canvases side by side */
  .views {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
  }
  .view-wrap {
    background: #1a1a2e;
    border: 4px solid #1a1a1a;
    border-radius: 12px;
    box-shadow: 5px 5px 0 #1a1a1a;
    overflow: hidden;
    position: relative;
  }
  .view-label {
    position: absolute; top: 7px; left: 10px;
    font-family: 'Bangers', cursive; font-size: 1rem;
    letter-spacing: 1.5px; color: #f4c430;
    text-shadow: 1px 1px 0 #000; z-index: 2;
  }
  .pattern-label {
    position: absolute; top: 7px; right: 10px;
    font-family: 'Bangers', cursive; font-size: 1.1rem;
    letter-spacing: 1.5px; color: #f4c430;
    text-shadow: 2px 2px 0 #1a1a1a; pointer-events: none;
    transition: opacity .5s; z-index: 2;
  }
  canvas { display: block; width: 100%; height: auto; }

  /* Controls */
  .controls {
    background: #fff; border: 3px solid #1a1a1a;
    border-radius: 12px; padding: 12px 16px;
    box-shadow: 5px 5px 0 #1a1a1a;
    display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 10px; margin-bottom: 12px;
  }
  .ctrl-group label {
    display: block; font-weight: 700; font-size: .78rem;
    color: #1a1a1a; margin-bottom: 3px;
    text-transform: uppercase; letter-spacing: .4px;
  }
  .ctrl-group .val { color: #e63946; font-family: 'Bangers', cursive; font-size: .95rem; }
  input[type=range] {
    width: 100%; -webkit-appearance: none;
    height: 7px; border-radius: 4px;
    background: #ddd; border: 2px solid #1a1a1a; outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 18px; height: 18px;
    border-radius: 50%; background: #f4c430;
    border: 3px solid #1a1a1a; cursor: pointer;
  }

  .btn-row {
    display: flex; gap: 10px; flex-wrap: wrap;
    justify-content: center; margin-bottom: 12px;
  }
  .btn {
    font-family: 'Bangers', cursive; font-size: 1rem;
    letter-spacing: 1.5px; padding: 7px 20px;
    border: 3px solid #1a1a1a; border-radius: 8px;
    cursor: pointer; box-shadow: 3px 3px 0 #1a1a1a;
    transition: transform .1s, box-shadow .1s;
  }
  .btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 #1a1a1a; }
  .btn-play  { background: #2dc653; color: #fff; }
  .btn-pause { background: #f4c430; color: #1a1a1a; }
  .btn-reset { background: #e63946; color: #fff; }
  .btn-color { background: #4361ee; color: #fff; }

  .time-bar {
    background: #fff; border: 3px solid #1a1a1a;
    border-radius: 8px; padding: 5px 14px;
    text-align: center; font-family: 'Bangers', cursive;
    font-size: 1.1rem; letter-spacing: 2px;
    box-shadow: 3px 3px 0 #1a1a1a; margin-bottom: 12px; color: #1a1a1a;
  }
  .time-bar span { color: #e63946; }

  .info {
    background: #e8f4fd; border: 3px solid #1a1a1a;
    border-radius: 12px; padding: 10px 14px;
    box-shadow: 4px 4px 0 #1a1a1a;
    font-size: .8rem; line-height: 1.55; color: #1a1a1a;
  }
  .info h3 { font-family: 'Bangers', cursive; font-size: 1.1rem; letter-spacing: 1px; margin-bottom: 4px; color: #4361ee; }

  @media (max-width: 600px) {
    .views { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="title">🎪 LA DANZA DE LOS PÉNDULOS 🎪</div>
  </div>

  <div class="views">
    <!-- FRONT VIEW -->
    <div class="view-wrap" id="wrapFront">
      <div class="pattern-label" id="patLabel"></div>
      <canvas id="cFront"></canvas>
    </div>
    <!-- PERSPECTIVE VIEW -->
    <div class="view-wrap" id="wrapPersp">
      <canvas id="cPersp"></canvas>
    </div>
  </div>

  <div class="time-bar">
    ⏱ Tiempo: <span id="tDisp">0.0</span> s &nbsp;|&nbsp;
    Ciclo: <span id="cDisp">0%</span>
  </div>

  <div class="btn-row">
    <button class="btn btn-play"  onclick="play()">▶ PLAY</button>
    <button class="btn btn-pause" onclick="pause()">⏸ PAUSA</button>
    <button class="btn btn-reset" onclick="reset()">↩ RESET</button>
  </div>

</div>

<script>
const cFront = document.getElementById('cFront');
const cPersp = document.getElementById('cPersp');
const ctxF = cFront.getContext('2d');
const ctxP = cPersp.getContext('2d');

let running = false, t = 0, lastTs = null, animId = null, useColor = true;

let N = 12, R = 13, T = 60, spd = 1.0, amp = 0.75, lenScale = 1.0;
const trailAlpha = 0.45;

const N_MIN = 40;

const PALETTE = [
  '#e63946','#f4c430','#2dc653','#4361ee','#b5179e',
  '#00b4d8','#f77f00','#06d6a0','#ef476f','#9bf1ff',
  '#a8dadc','#f4a261','#e76f51','#264653','#2a9d8f',
  '#e9c46a','#457b9d','#d62246','#7b2d8b','#06a77d',
];

const patterns = [
  { pct:0,  label:'🔵 SINCRONIZADOS' },
  { pct:8,  label:'🌊 OLA' },
  { pct:17, label:'🌀 ESPIRAL' },
  { pct:25, label:'🌊 OLA REVERSA' },
  { pct:33, label:'✨ ABANICO' },
  { pct:42, label:'🌀 ESPIRAL REVERSA' },
  { pct:50, label:'🔵 ANTI-FASE' },
  { pct:58, label:'🌀 ESPIRAL' },
  { pct:67, label:'✨ ABANICO' },
  { pct:75, label:'🌊 OLA' },
  { pct:83, label:'🌀 ESPIRAL REVERSA' },
  { pct:92, label:'🌊 OLA REVERSA' },
  { pct:99, label:'🔵 SINCRONIZADOS' },
];
let lastPatIdx = -1;

function freq(i) { return (N_MIN + i) / T; }
function angle(i, time) { return Math.sin(2 * Math.PI * freq(i) * time) * amp; }

function color(i) { return useColor ? PALETTE[i % PALETTE.length] : '#f4c430'; }

function resize() {
  const wF = document.getElementById('wrapFront').clientWidth;
  const hF = Math.round(wF * 0.75);
  cFront.width = wF; cFront.height = hF;

  const wP = document.getElementById('wrapPersp').clientWidth;
  const hP = Math.round(wP * 0.75);
  cPersp.width = wP; cPersp.height = hP;
}

// ---- FRONT VIEW ----
function drawFront() {
  const W = cFront.width, H = cFront.height;
  ctxF.fillStyle = `rgba(26,26,46,${1 - trailAlpha})`;
  ctxF.fillRect(0,0,W,H);

  const pivotY = Math.round(H * 0.07);
  const spacing = (W * 0.85) / Math.max(N-1, 1);
  const startX  = W * 0.075;
  const maxLen  = H * 0.83 * lenScale;
  const minLen  = H * 0.23 * lenScale;

  // Bar
  ctxF.strokeStyle = '#888'; ctxF.lineWidth = 3;
  ctxF.beginPath();
  ctxF.moveTo(W*0.05, pivotY); ctxF.lineTo(W*0.95, pivotY);
  ctxF.stroke();

  for (let i = 0; i < N; i++) {
    const x0    = startX + i * spacing;
    const len   = minLen + (i / Math.max(N-1,1)) * (maxLen - minLen);
    const theta = angle(i, t);
    const bx    = x0 + Math.sin(theta) * len;
    const by    = pivotY + Math.cos(theta) * len;
    const col   = color(i);

    ctxF.strokeStyle = col + '88'; ctxF.lineWidth = 1.5;
    ctxF.beginPath(); ctxF.moveTo(x0, pivotY); ctxF.lineTo(bx, by); ctxF.stroke();

    ctxF.beginPath(); ctxF.arc(bx, by, R+2, 0, Math.PI*2);
    ctxF.fillStyle = '#1a1a1a'; ctxF.fill();
    ctxF.beginPath(); ctxF.arc(bx, by, R, 0, Math.PI*2);
    ctxF.fillStyle = col; ctxF.fill();
    ctxF.beginPath(); ctxF.arc(bx - R*.3, by - R*.3, R*.28, 0, Math.PI*2);
    ctxF.fillStyle = 'rgba(255,255,255,.5)'; ctxF.fill();
  }
}

// ---- PERSPECTIVE VIEW ----
// Looking along the bar axis (from one end toward the other).
// Each pendulum i is at depth z_i. They all swing horizontally (same direction as front view).
// With perspective: objects farther away are smaller and shifted toward horizon.
function drawPersp() {
  const W = cPersp.width, H = cPersp.height;
  ctxP.fillStyle = `rgba(26,26,46,${1 - trailAlpha})`;
  ctxP.fillRect(0,0,W,H);

  // Horizon / vanishing point
  const vpX = W * 0.5;
  const vpY = H * 0.12;  // pivot horizon

  // Near depth scale, far depth scale
  const zNear = 1.0, zFar = 4.5;
  const maxLen = H * 0.23 * lenScale * 3.5;
  const minLen = H * 0.23 * lenScale * 3.5 * (0.23/0.83);

  // Ground line hint
  ctxP.strokeStyle = 'rgba(100,100,160,0.3)'; ctxP.lineWidth = 1;
  // Vanishing lines from corners to vp
  ctxP.beginPath(); ctxP.moveTo(0, H); ctxP.lineTo(vpX, vpY); ctxP.stroke();
  ctxP.beginPath(); ctxP.moveTo(W, H); ctxP.lineTo(vpX, vpY); ctxP.stroke();

  // Draw back-to-front (farthest first)
  for (let ii = N-1; ii >= 0; ii--) {
    const frac  = ii / Math.max(N-1, 1);           // 0=near, 1=far
    const z     = zNear + frac * (zFar - zNear);
    const persp = 1 / z;                            // sólo afecta tamaño de bola y grosor

    // Longitud VISUAL aumenta con la profundidad: el más lejano cuelga más abajo
    const visLen = minLen + (ii / Math.max(N-1,1)) * (maxLen - minLen);

    const theta = angle(ii, t);

    const pivX = vpX;
    const pivY = vpY;

    // Swing horizontal también se escala con perspectiva (más lejano oscila menos ancho)
    const swingX = Math.sin(theta) * visLen * persp;
    // Longitud vertical: visLen fija (no se encoge), sólo el swing horizontal se achica
    const swingY = Math.cos(theta) * visLen;

    const bx = pivX + swingX;
    const by = pivY + swingY;

    const col = color(ii);
    const r   = Math.max(2, Math.round((R + 2) * persp));

    // String
    ctxP.strokeStyle = col + '77'; ctxP.lineWidth = Math.max(1, 2 * persp);
    ctxP.beginPath(); ctxP.moveTo(pivX, pivY); ctxP.lineTo(bx, by); ctxP.stroke();

    // Ball
    if (r > 1) {
      ctxP.beginPath(); ctxP.arc(bx, by, r+1.5, 0, Math.PI*2);
      ctxP.fillStyle = '#1a1a1a'; ctxP.fill();
    }
    ctxP.beginPath(); ctxP.arc(bx, by, Math.max(1.5, r), 0, Math.PI*2);
    ctxP.fillStyle = col; ctxP.fill();
    if (r > 4) {
      ctxP.beginPath(); ctxP.arc(bx - r*.3, by - r*.3, r*.28, 0, Math.PI*2);
      ctxP.fillStyle = 'rgba(255,255,255,.5)'; ctxP.fill();
    }

    // Depth fade label for nearest
    if (ii === 0) {
      ctxP.fillStyle = col + 'aa';
      ctxP.font = `bold ${Math.max(8, Math.round(10*persp))}px Comic Neue, sans-serif`;
      ctxP.fillText('◀', bx - r - 12, by + 4);
    }
  }

  // Vanishing point marker
  ctxP.beginPath(); ctxP.arc(vpX, vpY, 4, 0, Math.PI*2);
  ctxP.fillStyle = 'rgba(255,255,255,0.2)'; ctxP.fill();
}

// ---- Pattern detection ----
function updatePattern() {
  const pct = ((t % T) / T) * 100;
  let idx = patterns.length - 1;
  for (let i = 0; i < patterns.length-1; i++) {
    if (pct >= patterns[i].pct && pct < patterns[i+1].pct) { idx = i; break; }
  }
  if (idx !== lastPatIdx) {
    lastPatIdx = idx;
    const el = document.getElementById('patLabel');
    el.textContent = patterns[idx].label;
    el.style.opacity = 0;
    setTimeout(() => el.style.opacity = 1, 10);
  }
}

function drawAll() { drawFront(); drawPersp(); }

// ---- Loop ----
function loop(ts) {
  if (!running) return;
  if (lastTs !== null) t += ((ts - lastTs) / 1000) * spd;
  lastTs = ts;
  drawAll();
  document.getElementById('tDisp').textContent = t.toFixed(1);
  document.getElementById('cDisp').textContent = Math.round(((t % T) / T) * 100) + '%';
  updatePattern();
  animId = requestAnimationFrame(loop);
}

function play()  { if (running) return; running=true; lastTs=null; animId=requestAnimationFrame(loop); }
function pause() { running=false; if (animId) cancelAnimationFrame(animId); }
function reset() {
  pause(); t=0; lastTs=null; lastPatIdx=-1;
  document.getElementById('patLabel').textContent='';
  document.getElementById('tDisp').textContent='0.0';
  document.getElementById('cDisp').textContent='0%';
  resize(); drawAll();
}

window.addEventListener('resize', () => { resize(); drawAll(); });
resize();
drawAll();
play();
</script>
</body>
</html>
